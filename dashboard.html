<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAN Training Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222534;
    --border: #2e3347;
    --accent: #6c8fff;
    --accent2: #a78bfa;
    --text: #e2e8f0;
    --muted: #8892a4;
    --success: #34d399;
    --radius: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    padding: 14px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    position: relative;
  }
  .home-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    transition: all .15s;
    white-space: nowrap;
    flex-shrink: 0;
    margin-left: auto;
  }
  .home-btn:hover { color: var(--text); border-color: var(--accent); background: var(--surface); }
  .home-btn svg { flex-shrink: 0; }
  .header-logo {
    width: 90px;
    height: 90px;
    position: absolute;
    top: 50%;
    left: 32px;
    transform: translateY(-50%);
  }
  .header-center {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    white-space: nowrap;
  }
  header h1 { font-size: 18px; font-weight: 700; }
  header .sub { color: var(--muted); font-size: 12px; margin-top: 2px; display: block; }

  /* ── Model tabs ── */
  #tab-bar {
    display: flex;
    gap: 4px;
    padding: 16px 32px 0;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .tab-btn {
    padding: 8px 18px;
    border-radius: var(--radius) var(--radius) 0 0;
    border: 1px solid transparent;
    border-bottom: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all .15s;
    position: relative;
    bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); background: var(--surface); }
  .tab-btn.active {
    color: var(--accent);
    background: var(--surface);
    border-color: var(--border);
    border-bottom-color: var(--surface);
  }

  /* ── Main layout ── */
  main { padding: 28px 32px; max-width: 1400px; }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Section headings ── */
  .section-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Plot grid ── */
  .plot-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 16px;
    margin-bottom: 36px;
  }
  .plot-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color .15s;
    cursor: zoom-in;
  }
  .plot-card:hover { border-color: var(--accent); }
  .plot-card img { width: 100%; display: block; background: #111; }
  .plot-label {
    padding: 8px 12px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }

  /* ── Epoch image viewer ── */
  .epoch-viewer {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 36px;
  }
  .epoch-controls {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .epoch-label { color: var(--muted); font-size: 13px; white-space: nowrap; }
  .epoch-num {
    font-weight: 700;
    color: var(--accent);
    min-width: 36px;
    text-align: center;
    font-size: 15px;
  }
  input[type=range] {
    flex: 1;
    min-width: 180px;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .epoch-img-wrap {
    display: flex;
    justify-content: center;
    background: #0a0c12;
    border-radius: 6px;
    padding: 12px;
  }
  .epoch-img-wrap img {
    max-width: 100%;
    max-height: 420px;
    object-fit: contain;
    image-rendering: pixelated;
    border-radius: 4px;
  }
  .play-btn {
    padding: 5px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    transition: background .15s;
  }
  .play-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── Lightbox ── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.92);
    z-index: 1000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #lightbox.open { display: flex; }
  #lb-canvas {
    flex: 1;
    width: 100%;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: grab;
    user-select: none;
  }
  #lb-canvas.dragging { cursor: grabbing; }
  #lb-img {
    transform-origin: center center;
    border-radius: 6px;
    box-shadow: 0 8px 48px rgba(0,0,0,.7);
    pointer-events: none;
    max-width: none;
    max-height: none;
    transition: transform .1s ease;
  }
  #lb-img.no-transition { transition: none; }
  #lb-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    width: 100%;
    justify-content: center;
    flex-shrink: 0;
  }
  .lb-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    transition: background .15s, border-color .15s;
  }
  .lb-btn:hover { background: var(--accent); border-color: var(--accent); }
  #lb-zoom-label {
    color: var(--muted);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    min-width: 48px;
    text-align: center;
  }
  .lb-sep {
    width: 1px;
    height: 20px;
    background: var(--border);
    margin: 0 4px;
  }

  .epoch-img-wrap img { cursor: zoom-in; }

  /* ── Comparison tab ── */
  .cmp-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    margin-top: 8px;
  }
  .cmp-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .cmp-card img {
    width: 100%;
    display: block;
    background: #111;
    image-rendering: pixelated;
    cursor: zoom-in;
  }
  .cmp-label {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }
  .cmp-label .cmp-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .cmp-label .cmp-tag  { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ── Misc ── */
  .loading { color: var(--muted); padding: 32px; text-align: center; font-size: 13px; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 600;
    background: var(--surface2);
    color: var(--success);
    border: 1px solid var(--border);
    margin-left: 6px;
  }
</style>
</head>
<body>

<script src="models.js"></script>
<script src="manifest.js"></script>

<header>
  <div class="header-logo">
    <svg viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
      <defs>
        <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="2.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <path d="M5,30 C15,30 18,26 22,28 C26,30 28,38 33,30 C38,22 42,5 50,5 C58,5 62,22 67,30 C72,38 74,30 78,28 C82,26 85,30 95,30 C105,30 110,28 115,30"
            fill="none" stroke="#ff9020" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    </svg>
  </div>
  <a class="home-btn" href="index.html">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    Home
  </a>
  <div class="header-center">
    <h1>GAN Training Dashboard</h1>
    <section class="sub">Serve with <code>python -m http.server 8000</code> from the project root</section>
  </div>
</header>

<div id="tab-bar"></div>
<main id="main"></main>

<div id="lightbox">
  <div id="lb-canvas">
    <img id="lb-img" src="" alt="">
  </div>
  <div id="lb-toolbar">
    <button class="lb-btn" id="lb-zoom-in" title="Zoom in (+)">+</button>
    <button class="lb-btn" id="lb-zoom-out" title="Zoom out (-)">&#8722;</button>
    <span id="lb-zoom-label">100%</span>
    <div class="lb-sep"></div>
    <button class="lb-btn" id="lb-reset" title="Reset (double-click)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    </button>
    <div class="lb-sep"></div>
    <button class="lb-btn" id="lb-close" title="Close (Esc)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
</div>

<script>
// ── Manifest-based file lookup (no server needed) ─────────────
function listPngs(dirUrl) {
  const parts = dirUrl.split('/');
  const subdir = parts.pop();           // "plots" or "images"
  const basePath = parts.join('/');
  const entry = (typeof MANIFEST !== 'undefined') ? MANIFEST[basePath] : null;
  return Promise.resolve(entry ? (entry[subdir] || []) : []);
}

const PLOT_LABELS = {
  'loss_curves.png':              'Loss Curves (G vs D/Critic)',
  'parzen_sigma_search.png':      'Parzen — σ Cross-Validation',
  'parzen_ll_distribution.png':   'Parzen — Log-Likelihood Distribution',
  'parzen_ll_per_sample.png':     'Parzen — Log-Likelihood per Sample',
  'id_curves.png':    'Intrinsic Dimensionality',
  'cka.png':          'CKA — Discriminator Layers',
  'architecture.png': 'Network Architecture',
};
function plotLabel(f) {
  return PLOT_LABELS[f] || f.replace(/_/g, ' ').replace(/\.png$/, '');
}

const PLOT_ORDER = ['id_curves.png', 'cka.png', 'loss_curves.png', 'parzen_sigma_search.png', 'parzen_ll_distribution.png', 'parzen_ll_per_sample.png', 'architecture.png'];
function sortPlots(files) {
  const ranked = PLOT_ORDER.filter(f => files.includes(f));
  const rest   = files.filter(f => !PLOT_ORDER.includes(f)).sort();
  return [...ranked, ...rest];
}

// ── Lightbox ──────────────────────────────────────────────────
const lightbox    = document.getElementById('lightbox');
const lbCanvas    = document.getElementById('lb-canvas');
const lbImg       = document.getElementById('lb-img');
const lbZoomLabel = document.getElementById('lb-zoom-label');

let lbScale = 1, lbMinScale = 1, lbMaxScale = 8;
let lbTx = 0, lbTy = 0;
let lbDragging = false, lbDragSx = 0, lbDragSy = 0, lbDragTx = 0, lbDragTy = 0;

function lbApply(transition) {
  if (!transition) lbImg.classList.add('no-transition');
  lbImg.style.transform = `translate(${lbTx}px,${lbTy}px) scale(${lbScale})`;
  lbZoomLabel.textContent = Math.round(lbScale * 100) + '%';
  if (!transition) requestAnimationFrame(() => lbImg.classList.remove('no-transition'));
}

function lbClamp() {
  const cr = lbCanvas.getBoundingClientRect();
  const iw = lbImg.naturalWidth  * lbScale;
  const ih = lbImg.naturalHeight * lbScale;
  const maxTx = Math.max(0, (iw - cr.width)  / 2);
  const maxTy = Math.max(0, (ih - cr.height) / 2);
  lbTx = Math.max(-maxTx, Math.min(maxTx, lbTx));
  lbTy = Math.max(-maxTy, Math.min(maxTy, lbTy));
}

function lbZoomAt(factor, cx, cy) {
  const cr = lbCanvas.getBoundingClientRect();
  const ox = cx - (cr.left + cr.width  / 2);
  const oy = cy - (cr.top  + cr.height / 2);
  const next = Math.max(lbMinScale, Math.min(lbMaxScale, lbScale * factor));
  const ratio = next / lbScale;
  lbTx = ox - (ox - lbTx) * ratio;
  lbTy = oy - (oy - lbTy) * ratio;
  lbScale = next;
  lbClamp();
  lbApply(true);
}

function lbReset() {
  lbScale = lbMinScale;
  lbTx = 0;
  lbTy = 0;
  lbApply(true);
}

function openLightbox(src) {
  lbImg.src = src;
  lbImg.onload = () => {
    const cr = lbCanvas.getBoundingClientRect();
    const sw = cr.width  / lbImg.naturalWidth;
    const sh = cr.height / lbImg.naturalHeight;
    lbMinScale = Math.min(sw, sh, 1);
    lbScale = lbMinScale;
    lbTx = 0;
    lbTy = 0;
    lbApply(false);
  };
  lightbox.classList.add('open');
}

function closeLightbox() { lightbox.classList.remove('open'); }

document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lb-zoom-in').addEventListener('click', () => {
  const cr = lbCanvas.getBoundingClientRect();
  lbZoomAt(1.25, cr.left + cr.width / 2, cr.top + cr.height / 2);
});
document.getElementById('lb-zoom-out').addEventListener('click', () => {
  const cr = lbCanvas.getBoundingClientRect();
  lbZoomAt(1 / 1.25, cr.left + cr.width / 2, cr.top + cr.height / 2);
});
document.getElementById('lb-reset').addEventListener('click', lbReset);

lbCanvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
  lbZoomAt(factor, e.clientX, e.clientY);
}, { passive: false });

lbCanvas.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  lbDragging = true;
  lbDragSx = e.clientX; lbDragSy = e.clientY;
  lbDragTx = lbTx;      lbDragTy = lbTy;
  lbCanvas.classList.add('dragging');
});
window.addEventListener('mousemove', e => {
  if (!lbDragging) return;
  lbTx = lbDragTx + (e.clientX - lbDragSx);
  lbTy = lbDragTy + (e.clientY - lbDragSy);
  lbClamp();
  lbApply(false);
});
window.addEventListener('mouseup', () => {
  if (!lbDragging) return;
  lbDragging = false;
  lbCanvas.classList.remove('dragging');
});

lbCanvas.addEventListener('dblclick', lbReset);

document.addEventListener('keydown', e => {
  if (!lightbox.classList.contains('open')) return;
  const cr = lbCanvas.getBoundingClientRect();
  const cx = cr.left + cr.width / 2, cy = cr.top + cr.height / 2;
  if (e.key === 'Escape')      { closeLightbox(); }
  else if (e.key === '+' || e.key === '=') { lbZoomAt(1.25, cx, cy); }
  else if (e.key === '-')      { lbZoomAt(1 / 1.25, cx, cy); }
  else if (e.key === 'ArrowLeft')  { lbTx -= 40; lbClamp(); lbApply(false); }
  else if (e.key === 'ArrowRight') { lbTx += 40; lbClamp(); lbApply(false); }
  else if (e.key === 'ArrowUp')    { lbTy -= 40; lbClamp(); lbApply(false); }
  else if (e.key === 'ArrowDown')  { lbTy += 40; lbClamp(); lbApply(false); }
});

// ── Epoch viewer ──────────────────────────────────────────────
const players = {};

function buildEpochViewer(panelEl, panelId, baseUrl, imageFiles) {
  const epochs = imageFiles
    .filter(f => /epoch_\d+\.png/i.test(f))
    .sort((a, b) => parseInt(a.match(/\d+/)) - parseInt(b.match(/\d+/)));
  if (!epochs.length) return;

  const total = epochs.length;
  players[panelId] = { timer: null, playing: false };

  const viewer = document.createElement('div');
  viewer.className = 'epoch-viewer';
  viewer.innerHTML = `
    <div class="section-title">Generated Images <span class="badge">${total} epochs</span></div>
    <div class="epoch-controls">
      <span class="epoch-label">Epoch</span>
      <span class="epoch-num" id="${panelId}-enum">1</span>
      <input type="range" id="${panelId}-slider" min="1" max="${total}" value="1">
      <button class="play-btn" id="${panelId}-play">&#9654; Play</button>
    </div>
    <div class="epoch-img-wrap">
      <img id="${panelId}-eimg" src="${baseUrl}/images/${epochs[0]}" alt="Epoch 1">
    </div>
  `;
  panelEl.appendChild(viewer);

  const slider  = document.getElementById(`${panelId}-slider`);
  const enumEl  = document.getElementById(`${panelId}-enum`);
  const eimg    = document.getElementById(`${panelId}-eimg`);
  const playBtn = document.getElementById(`${panelId}-play`);

  function goTo(idx) {
    slider.value = idx;
    enumEl.textContent = idx;
    eimg.src = `${baseUrl}/images/${epochs[idx - 1]}`;
  }

  eimg.style.cursor = 'zoom-in';
  eimg.addEventListener('click', () => openLightbox(eimg.src));

  slider.addEventListener('input', () => goTo(parseInt(slider.value)));
  playBtn.addEventListener('click', () => {
    const p = players[panelId];
    if (p.playing) {
      clearInterval(p.timer); p.playing = false; playBtn.innerHTML = '&#9654; Play';
    } else {
      p.playing = true; playBtn.innerHTML = '&#9632; Stop';
      p.timer = setInterval(() => goTo(parseInt(slider.value) % total + 1), 200);
    }
  });
}

// ── Build panel ───────────────────────────────────────────────
async function buildPanel(model, panelId) {
  const panel = document.getElementById(panelId);
  panel.innerHTML = '<div class="loading">Loading plots…</div>';

  const [plotFiles, imageFiles] = await Promise.all([
    listPngs(`${model.path}/plots`),
    listPngs(`${model.path}/images`),
  ]);

  panel.innerHTML = '';

  const sorted = sortPlots(plotFiles);
  if (sorted.length) {
    const t = document.createElement('div');
    t.className = 'section-title';
    t.textContent = 'Analysis Plots';
    panel.appendChild(t);

    const grid = document.createElement('div');
    grid.className = 'plot-grid';
    sorted.forEach(file => {
      const src  = `${model.path}/plots/${file}`;
      const card = document.createElement('div');
      card.className = 'plot-card';
      card.innerHTML = `<img src="${src}" alt="${file}" loading="lazy"><div class="plot-label">${plotLabel(file)}</div>`;
      card.querySelector('img').addEventListener('click', () => openLightbox(src));
      grid.appendChild(card);
    });
    panel.appendChild(grid);
  } else {
    panel.innerHTML = `<div class="loading">No plots found in ${model.path}/plots</div>`;
  }

  buildEpochViewer(panel, panelId, model.path, imageFiles);
}

// ── Comparison panel ──────────────────────────────────────────
async function buildComparisonPanel(panel) {
  panel.innerHTML = '<div class="loading">Loading final outputs…</div>';

  const results = await Promise.all(MODELS.map(async model => {
    const files = await listPngs(`${model.path}/images`);
    const epochs = files
      .filter(f => /epoch_\d+\.png/i.test(f))
      .sort((a, b) => parseInt(a.match(/\d+/)) - parseInt(b.match(/\d+/)));
    const last = epochs[epochs.length - 1] || null;
    return { model, src: last ? `${model.path}/images/${last}` : null, epoch: last ? parseInt(last.match(/\d+/)) : null };
  }));

  panel.innerHTML = '';

  const title = document.createElement('div');
  title.className = 'section-title';
  title.textContent = 'Final Generated Images — All Experiments';
  panel.appendChild(title);

  const grid = document.createElement('div');
  grid.className = 'cmp-grid';

  results.forEach(({ model, src, epoch }) => {
    const card = document.createElement('div');
    card.className = 'cmp-card';
    if (src) {
      card.innerHTML = `
        <img src="${src}" alt="${model.name} final output" loading="lazy">
        <div class="cmp-label">
          <div class="cmp-name">${model.name}</div>
          <div class="cmp-tag">${model.tag ? model.tag + ' · ' : ''}epoch ${epoch}</div>
        </div>`;
      card.querySelector('img').addEventListener('click', () => openLightbox(src));
    } else {
      card.innerHTML = `
        <div style="padding:40px;text-align:center;color:var(--muted);font-size:13px;">No images found</div>
        <div class="cmp-label">
          <div class="cmp-name">${model.name}</div>
          <div class="cmp-tag">${model.tag || ''}</div>
        </div>`;
    }
    grid.appendChild(card);
  });

  panel.appendChild(grid);
}

// ── Bootstrap ─────────────────────────────────────────────────
function init() {
  const tabBar = document.getElementById('tab-bar');
  const mainEl = document.getElementById('main');
  const loaded = new Set();

  // Read ?model=N from URL to pre-select a tab
  const urlParams  = new URLSearchParams(window.location.search);
  const initModel  = Math.min(
    parseInt(urlParams.get('model') || '0', 10),
    MODELS.length - 1,
  );

  MODELS.forEach((model, i) => {
    const panelId = `panel-${i}`;
    const isActive = i === initModel;

    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (isActive ? ' active' : '');
    btn.textContent = model.name;
    if (model.tag) {
      const badge = document.createElement('span');
      badge.className = 'badge';
      badge.textContent = model.tag;
      btn.appendChild(badge);
    }
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(panelId).classList.add('active');
      if (!loaded.has(panelId)) { loaded.add(panelId); buildPanel(model, panelId); }
    });
    tabBar.appendChild(btn);

    const panel = document.createElement('div');
    panel.id = panelId;
    panel.className = 'tab-panel' + (isActive ? ' active' : '');
    mainEl.appendChild(panel);
  });

  if (MODELS.length) {
    const firstId = `panel-${initModel}`;
    loaded.add(firstId);
    buildPanel(MODELS[initModel], firstId);
  }

  // ── Comparison tab ────────────────────────────────────────────
  const cmpBtn = document.createElement('button');
  cmpBtn.className = 'tab-btn';
  cmpBtn.textContent = 'Comparison';
  cmpBtn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    cmpBtn.classList.add('active');
    const cmpPanel = document.getElementById('panel-comparison');
    cmpPanel.classList.add('active');
    if (!loaded.has('panel-comparison')) {
      loaded.add('panel-comparison');
      buildComparisonPanel(cmpPanel);
    }
  });
  tabBar.appendChild(cmpBtn);

  const cmpPanel = document.createElement('div');
  cmpPanel.id = 'panel-comparison';
  cmpPanel.className = 'tab-panel';
  mainEl.appendChild(cmpPanel);

  // ── Notes tab (static, always present) ────────────────────────
  const notesBtn = document.createElement('button');
  notesBtn.className = 'tab-btn';
  notesBtn.textContent = 'Notes';
  notesBtn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    notesBtn.classList.add('active');
    document.getElementById('panel-notes').classList.add('active');
  });
  tabBar.appendChild(notesBtn);

  const notesPanel = document.createElement('div');
  notesPanel.id = 'panel-notes';
  notesPanel.className = 'tab-panel';
  notesPanel.innerHTML = `
    <div style="
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 14px;
    ">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
      </svg>
      <span style="color: var(--muted); font-size: 13px; flex: 1;">Generative adversarial networks.pdf</span>
      <a
        href="Generative%20adversarial%20networks.pdf"
        target="_blank"
        rel="noopener noreferrer"
        style="
          display: inline-flex;
          align-items: center;
          gap: 6px;
          padding: 5px 12px;
          border-radius: 6px;
          border: 1px solid var(--border);
          background: var(--surface2);
          color: var(--accent);
          text-decoration: none;
          font-size: 12px;
          font-weight: 500;
          transition: background .15s, border-color .15s;
          white-space: nowrap;
        "
        onmouseover="this.style.background='var(--accent)';this.style.borderColor='var(--accent)';this.style.color='#fff';"
        onmouseout="this.style.background='var(--surface2)';this.style.borderColor='var(--border)';this.style.color='var(--accent)';"
      >
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Open in new tab
      </a>
    </div>
    <object
      data="Generative%20adversarial%20networks.pdf"
      type="application/pdf"
      style="
        width: 100%;
        height: calc(100vh - 130px);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        display: block;
      "
    >
      <div style="
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: calc(100vh - 130px);
        gap: 16px;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        font-size: 14px;
      ">
        <span>Your browser cannot display PDFs inline.</span>
        <a
          href="Generative%20adversarial%20networks.pdf"
          target="_blank"
          style="color: var(--accent); font-weight: 600; text-decoration: none;"
        >Open PDF directly →</a>
      </div>
    </object>
  `;
  mainEl.appendChild(notesPanel);
}

init();
</script>
